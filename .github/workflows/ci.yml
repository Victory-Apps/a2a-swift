name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: xcodebuild build -scheme A2A -destination 'generic/platform=iOS' -skipPackagePluginValidation

  build-tvos:
    name: tvOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for tvOS
        run: xcodebuild build -scheme A2A -destination 'generic/platform=tvOS' -skipPackagePluginValidation

  build-watchos:
    name: watchOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for watchOS
        run: xcodebuild build -scheme A2A -destination 'generic/platform=watchOS' -skipPackagePluginValidation
